version: "3.9"

services:
  db:
    image: postgres:16
    container_name: issue-tracker-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: issue_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: issue-tracker-backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/issue_tracker?schema=public
      PORT: 4000
      JWT_SECRET: dev-secret-change-this-later
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    container_name: issue-tracker-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  pgdata:
